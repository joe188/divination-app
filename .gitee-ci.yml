version: '1.0'
name: 灵枢排盘 - APK 构建
description: 自动构建 Release APK（完整环境 + 签名）

stages:
 - name: 构建
   jobs:
   - name: build-apk
     image: node:20
     steps:
     - step: shell@bash
       name: prepare
       displayName: 准备环境
       run: |
         echo "🚀 开始构建灵枢排盘"
         cd /root/workspace/joelinfo/divination-apk

     - step: shell@bash
       name: install_java
       displayName: 安装 JDK 17
       run: |
         apt-get update
         apt-get install -y openjdk-17-jdk-headless unzip
         export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
         export PATH=$JAVA_HOME/bin:$PATH
         java -version

     - step: shell@bash
       name: install_android_sdk
       displayName: 安装 Android SDK
       run: |
         export ANDROID_HOME=/opt/android-sdk
         export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
         mkdir -p $ANDROID_HOME/cmdline-tools
         curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
         unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
         mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
         yes | sdkmanager --licenses > /dev/null 2>&1
         sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" "ndk;25.1.8937393"

     - step: shell@bash
       name: config_gradle
       displayName: 配置 Gradle 镜像
       run: |
         mkdir -p ~/.gradle
         cat > ~/.gradle/init.gradle << 'EOF'
 allprojects {
 repositories {
 maven { url 'https://maven.aliyun.com/repository/google' }
 maven { url 'https://maven.aliyun.com/repository/public' }
 mavenCentral()
 }
 }
 EOF

     - step: shell@bash
       name: install_deps
       displayName: 安装依赖
       run: |
         cd /root/workspace/joelinfo/divination-apk
         npm config set registry https://registry.npmmirror.com
         if [ -f package-lock.json ]; then
           npm ci --legacy-peer-deps
         else
           npm install --legacy-peer-deps
         fi
         npm audit --audit-level=high || true

     - step: shell@bash
       name: build_apk
       displayName: 构建 APK
       run: |
         cd /root/workspace/joelinfo/divination-apk/android
         echo "📋 检查 android 目录文件列表："
         ls -la

         # 终极修复：如果 gradlew 不存在，直接从 Gradle 官方下载标准版
         if [ ! -f "gradlew" ]; then
           echo "⚠️ gradlew 丢失，从 GitHub 下载官方标准版"
           curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/master/gradlew
           chmod +x gradlew
         else
           echo "✅ gradlew 已存在，修复权限"
           chmod +x gradlew
         fi

         # 确保 gradle-wrapper.jar 存在（即使 gradlew 也存在）
         if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
           echo "⚠️ gradle-wrapper.jar 缺失，从 GitHub 下载"
           mkdir -p gradle/wrapper
           curl -L -o gradle/wrapper/gradle-wrapper.jar https://repo1.maven.org/maven2/org/ow2/asm/asm/9.6/asm-9.6.jar || true
           # 实际上 wrapper jar 应该在 git 中，如真缺失则可能无法构建，但我们先尝试
         fi

         echo "🔨 执行 Gradle 构建..."
         ./gradlew clean assembleRelease \
           -PstoreFile=${RELEASE_KEY} \
           -PstorePassword=${STORE_PASSWORD} \
           -PkeyAlias=${KEY_ALIAS} \
           -PkeyPassword=${KEY_PASSWORD} \
           --no-daemon --stacktrace --warning-mode all

     - step: shell@bash
       name: verify_apk
       displayName: 验证产物
       run: |
         APK="/root/workspace/joelinfo/divination-apk/android/app/build/outputs/apk/release/app-release.apk"
         if [ -f "$APK" ]; then
           echo "✅ APK 存在: $(ls -lh $APK)"
         else
           echo "❌ APK 未生成"
           exit 1
         fi

 artifacts:
   - path: /root/workspace/joelinfo/divination-apk/android/app/build/outputs/apk/release/
     name: output
     expire: 7d
