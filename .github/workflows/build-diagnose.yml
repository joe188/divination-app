name: Build Android APK (Show Real Errors)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          ndk: '25.1.8937393'

      - name: Setup Gradle 8.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Install JS dependencies
        run: npm install

      # 🔥 直接编译，失败即停止，显示真实红色错误
      - name: Build APK
        run: |
          cd android
          gradle clean assembleRelease --no-daemon --stacktrace
