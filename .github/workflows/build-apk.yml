name: 🚀 Android Release Build (Signed)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧱 Build React Native Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🔨 Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --console=plain

      - name: 🔍 Verify APK Signature
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "app-release*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ 未找到 Release APK!"
            exit 1
          fi
          echo "🔍 检查 APK: $APK_PATH"
          if unzip -l "$APK_PATH" | grep -q "META-INF/MANIFEST.MF"; then
            echo "✅ META-INF/MANIFEST.MF 存在（V1 签名）"
          else
            echo "❌ 缺少 META-INF/MANIFEST.MF！"
            exit 1
          fi

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LingShu-signed-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "============================================"
          echo "✅ Build successful!"
          echo "📦 APK: 下载 Artifacts 中的 LingShu-signed-apk"
          echo "============================================"