name: Build LingShu APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build React Native Bundle
        run: |
          # 确保 assets 目录存在
          mkdir -p android/app/src/main/assets
          # 打包 JS bundle
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          echo "✅ JS Bundle 打包完成"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (Debug First)
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          cd android
          echo "🚀 先尝试 debug 构建..."
          gradle clean assembleDebug 2>&1 || true
          
          # 🔍 调试：检查 APK 是否生成
          echo ""
          echo "========================================"
          echo "🔍 查找 APK 文件"
          echo "========================================"
          find . -name "*.apk" 2>/dev/null || echo "未找到 APK"

      - name: Rename APK to LingShu
        run: |
          # 优先使用 release，如果没有就用 debug
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk LingShu.apk
          elif [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk LingShu.apk
          fi
          echo "✅ APK 已重命名为：LingShu.apk"

      - name: Push to Gitee (China Mirror)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🚀 正在推送到 Gitee (joelinfo/divination-apk)..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 克隆仓库（私有仓库需要认证）
          git clone https://gitee.com/joelinfo/divination-apk.git gitee-mirror
          cd gitee-mirror
          
          # 配置认证
          git remote set-url origin https://joelinfo:$GITEE_TOKEN@gitee.com/joelinfo/divination-apk.git
          
          cp ../LingShu.apk ./
          git add LingShu.apk
          git commit -m "feat: 上传灵枢智能排盘 APK (Auto-build from GitHub)"
          git push origin master
          
          echo "============================================"
          echo "🎉 构建并推送成功！"
          echo "📥 下载地址：https://gitee.com/joelinfo/divination-apk/raw/master/LingShu.apk"
          echo "============================================"