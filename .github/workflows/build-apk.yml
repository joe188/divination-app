name: 🚀 Android Release Build (Signed)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write  # 用于创建 Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔍 Verify Java version
        run: |
          echo "🔍 JAVA_HOME: $JAVA_HOME"
          java -version
          "${JAVA_HOME}/bin/keytool" -version

      - name: 🔐 Decode and place keystore
        run: |
          echo "🔑 正在解码 keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          chmod 600 android/app/release.keystore
          ls -la android/app/release.keystore

      - name: 🧱 Build React Native Bundle
        run: |
          echo "📦 打包 JS bundle..."
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          echo "✅ JS Bundle 打包完成"

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🔨 Build Release APK with Gradle
        run: |
          echo "🚀 开始 Gradle 构建..."
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --console=plain
          echo "✅ Gradle 构建完成"

      - name: 🔍 Verify APK Signature
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "app-release*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ 未找到 Release APK!"
            find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi
          
          echo "🔍 检查 APK: $APK_PATH"
          
          # 检查 META-INF 目录（V1 签名）
          if unzip -l "$APK_PATH" | grep -q "META-INF/MANIFEST.MF"; then
            echo "✅ META-INF/MANIFEST.MF 存在（V1 签名）"
          else
            echo "❌ 缺少 META-INF/MANIFEST.MF！签名失败。"
            unzip -l "$APK_PATH" | head -30
            exit 1
          fi
          
          if unzip -l "$APK_PATH" | grep -q "META-INF/CERT.RSA"; then
            echo "✅ META-INF/CERT.RSA 存在"
          fi
          
          if unzip -l "$APK_PATH" | grep -q "META-INF/CERT.SF"; then
            echo "✅ META-INF/CERT.SF 存在"
          fi

      - name: 🔑 Show SHA-256 Fingerprint
        run: |
          if [ -f android/app/release.keystore ]; then
            echo "🔑 密钥库 SHA-256 指纹："
            "${JAVA_HOME}/bin/keytool" -list -v -keystore android/app/release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>/dev/null | grep "SHA256:" | head -1
          else
            echo "⚠️ 未找到 release.keystore"
          fi

      - name: 📦 Rename and Upload APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "app-release*.apk" | head -1)
          cp "$APK_PATH" LingShu-signed.apk
          echo "📦 APK 文件名: LingShu-signed.apk"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingShu-signed-apk
          path: LingShu-signed.apk
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "============================================"
          echo "✅ Build successful!"
          echo "📦 APK: LingShu-signed.apk (download from Artifacts)"
          echo "🔑 签名: V1 (JAR) + V2 (Full APK)"
          echo "📱 安装前请先卸载旧版本"
          echo "============================================"
