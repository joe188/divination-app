name: Build LingShu APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build React Native Bundle
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res || echo "Bundle step skipped"

      - name: Build APK
        env:
          GRADLE_USER_HOME: /tmp/gradle-home
          # 强制覆盖 JVM 参数
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"
          JAVA_OPTS: "-Xmx2048m"
        run: |
          cd android
          # 彻底清理旧环境
          rm -rf ~/.gradle/caches
          rm -rf .gradle
          rm -rf ~/.gradle/wrapper/dists
          
          # 打印环境变量确认
          echo "GRADLE_OPTS: $GRADLE_OPTS"
          echo "JAVA_OPTS: $JAVA_OPTS"
          
          # 【终极方案】直接使用 java -jar 运行 Gradle Wrapper，彻底绕过 gradlew 脚本逻辑错误
          echo "🚀 使用 java -jar 直接运行 Gradle Wrapper..."
          java -jar gradle/wrapper/gradle-wrapper.jar clean assembleRelease --no-daemon --no-build-cache --refresh-dependencies --stacktrace

      - name: Rename APK to LingShu
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk LingShu.apk
          echo "✅ APK 已重命名为：LingShu.apk"

      - name: Push to Gitee (China Mirror)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🚀 正在推送到 Gitee (joel/divination-apk)..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 克隆 Gitee 仓库
          git clone https://joel:${GITEE_TOKEN}@gitee.com/joel/divination-apk.git gitee-mirror
          cp LingShu.apk gitee-mirror/
          cd gitee-mirror
          
          git add LingShu.apk
          git commit -m "feat: 上传灵枢智能排盘 APK (Auto-build from GitHub)"
          git push origin master
          
          echo "============================================"
          echo "🎉 构建并推送成功！"
          echo "📥 下载地址：https://gitee.com/joel/divination-apk/raw/master/LingShu.apk"
          echo "============================================"
