name: Build Android APK (Clean Build Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '18' }

      - name: Install Deps
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Show Result
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            echo "✅ SUCCESS! APK built at: $APK"
            echo "📦 Size: $(ls -lh $APK | awk '{print $5}')"
            echo "💡 NOTE: Due to GitHub policy, file download is disabled in this run."
            echo "💡 Please check Actions tab or contact admin for artifact access."
          else
            echo "❌ FAILED: APK not found!"
            exit 1
          fi
