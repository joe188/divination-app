name: Build LingShu APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build React Native Bundle
        run: |
          # 确保 assets 目录存在
          mkdir -p android/app/src/main/assets
          # 打包 JS bundle
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          echo "✅ JS Bundle 打包完成"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Gradle Wrapper
        run: |
          echo "🚀 下载 Gradle Wrapper..."
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          ls -la android/gradle/wrapper/

      - name: Build APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          echo "🚀 直接用 Java 运行 Gradle Wrapper..."
          
          # 确保 JS bundle 已生成
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          
          # 直接用 java -jar 运行 Gradle Wrapper (绕过 gradlew 脚本)
          cd android
          java -jar gradle/wrapper/gradle-wrapper.jar assembleRelease --no-daemon 2>&1 | tail -40
          
          # 检查
          echo ""
          echo "🔍 检查 APK..."
          ls -la app/build/outputs/apk/release/ 2>/dev/null || find . -name "*.apk" -type f 2>/dev/null

      - name: Rename APK to LingShu
        run: |
          # 优先使用 release，如果没有就用 debug
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk LingShu.apk
          elif [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk LingShu.apk
          fi
          echo "✅ APK 已重命名为：LingShu.apk"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingShu-apk
          path: LingShu.apk
          retention-days: 7

      - name: Display Download Info
        run: |
          echo "============================================"
          echo "🎉 构建成功！"
          echo ""
          echo "📦 APK 文件名: LingShu.apk"
          echo "📥 请在页面顶部 Artifacts 处下载"
          echo ""
          echo "📱 安装前请先卸载旧版本"
          echo "============================================"