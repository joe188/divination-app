name: Build LingShu APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build React Native Bundle
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res || echo "Bundle step skipped"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          cd android
          
          # 清理 Gradle 缓存中残留的 macOS Java 路径
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf .gradle
          
          # 直接使用系统级 gradle 命令（参考配置）
          echo "🚀 使用 gradle 命令直接构建..."
          gradle --no-daemon clean assembleRelease --stacktrace 2>&1 | tee /tmp/gradle.log || true
          
          # 🔍 调试：列出所有生成的文件
          echo "=== 调试信息：列出 android/app/build 目录 ===" 
          find . -name "*.apk" 2>/dev/null || echo "❌ 未找到任何 APK 文件"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "❌ apk 目录不存在"
          cat /tmp/gradle.log | tail -50

      - name: Rename APK to LingShu
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk LingShu.apk
          echo "✅ APK 已重命名为：LingShu.apk"

      - name: Push to Gitee (China Mirror)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🚀 正在推送到 Gitee (joel/divination-apk)..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 克隆 Gitee 仓库
          git clone https://joel:${GITEE_TOKEN}@gitee.com/joel/divination-apk.git gitee-mirror
          cp LingShu.apk gitee-mirror/
          cd gitee-mirror
          
          git add LingShu.apk
          git commit -m "feat: 上传灵枢智能排盘 APK (Auto-build from GitHub)"
          git push origin master
          
          echo "============================================"
          echo "🎉 构建并推送成功！"
          echo "📥 下载地址：https://gitee.com/joel/divination-apk/raw/master/LingShu.apk"
          echo "============================================"
