version: '1.0'
name: build-apk-20260409
displayName: 构建APK
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
stages:
  - name: build
    displayName: ''
    strategy: naturally
    trigger: auto
    steps:
      - step: build@gradle
        name: build_gradleap
        displayName: 构建签名 APK
        jdkVersion: '17'
        gradleVersion: '7.6'
        commands:
          - set -e
          - cd /root/workspace/joelinfo/divination-apk
          - ''
          - apt-get update -y
          - apt-get install -y curl
          - ''
          - '# 安装 Node 20'
          - curl -fsSL https://npmmirror.com/mirrors/node/v20.18.0/node-v20.18.0-linux-x64.tar.gz | tar -xz --strip-components=1 -C /usr/local
          - ''
          - node -v
          - npm -v
          - ''
          - npm config set registry https://registry.npmmirror.com
          - npm install --legacy-peer-deps
          - ''
          - '# 🔥 修复 Android 插件下载（关键）'
          - cd android
          - chmod +x gradlew
          - ''
          - '# 先让 gradle 完整下载依赖'
          - ./gradlew --version --no-daemon
          - ''
          - '# 再正式打包'
          - ./gradlew clean assembleRelease \
          - '  -PstoreFile=${RELEASE_KEY} \'
          - '  -PstorePassword=${STORE_PASSWORD} \'
          - '  -PkeyAlias=${KEY_ALIAS} \'
          - '  -PkeyPassword=${KEY_PASSWORD} \'
          - '  --no-daemon --refresh-dependencies'
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - android/app/build/outputs/apk/release/*.apk
        caches:
          - ~/.gradle/caches
        notify: []
        strategy:
          retry: '0'
