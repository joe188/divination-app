version: '1.0'
name: build-apk-20260409
displayName: 构建APK
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
stages:
  - name: build
    displayName: ''
    strategy: naturally
    trigger: auto
    steps:
      - step: execute@docker
        name: execute_by_docker
        displayName: 基于镜像的脚本执行
        certificate: ''
        image: ubuntu:22.04
        command:
          - set -e
          - echo "=== 初始化构建环境 ==="
          - ''
          - '# 1. 安装核心依赖'
          - apt-get update -y
          - apt-get install -y curl wget unzip zip git openjdk-17-jdk
          - ''
          - '# 2. 安装 Node.js 20（彻底解决 ? 语法问题）'
          - echo "=== 安装 Node.js 20 ==="
          - curl -fsSL https://npmmirror.com/mirrors/node/v20.18.0/node-v20.18.0-linux-x64.tar.gz | tar -xz --strip-components=1 -C /usr/local
          - node -v
          - npm -v
          - ''
          - '# 3. 配置 npm 国内源'
          - echo "=== 安装依赖 ==="
          - npm config set registry https://registry.npmmirror.com
          - npm install --legacy-peer-deps
          - ''
          - '# 4. 配置 Android 环境（自动下载安装）'
          - echo "=== 配置 Android SDK ==="
          - export ANDROID_HOME=$PWD/android-sdk
          - mkdir -p $ANDROID_HOME/cmdline-tools
          - cd $ANDROID_HOME/cmdline-tools
          - ''
          - '# 下载命令行工具'
          - wget -q https://npmmirror.com/mirrors/android/repository/commandlinetools-linux-9477381_latest.zip
          - unzip -q commandlinetools-linux-9477381_latest.zip
          - mv cmdline-tools latest
          - ''
          - '# 接受许可 + 安装必要组件'
          - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          - yes | sdkmanager --licenses > /dev/null 2>&1
          - sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools" > /dev/null 2>&1
          - ''
          - '# 5. 最终打包签名 APK'
          - echo "=== 开始打包签名 ==="
          - cd /root/workspace/joelinfo/divination-apk/android
          - chmod +x gradlew
          - ./gradlew clean assembleRelease \
          - '  -PstoreFile=${RELEASE_KEY} \'
          - '  -PstorePassword=${STORE_PASSWORD} \'
          - '  -PkeyAlias=${KEY_ALIAS} \'
          - '  -PkeyPassword=${KEY_PASSWORD} \'
          - '  --no-daemon'
          - ''
          - echo "✅ 构建成功！APK 路径：android/app/build/outputs/apk/release/app-release.apk"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
        notify: []
        strategy:
          retry: '0'
