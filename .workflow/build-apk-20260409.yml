version: '1.0'
name: build-apk-20260409
displayName: 构建APK
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
stages:
  - name: build
    displayName: ''
    strategy: naturally
    trigger: auto
    steps:
      - step: execute@docker
        name: 1ubuntu2
        displayName: 拉取代码
        certificate: ''
        image: ubuntu:22.04
        command:
          - '#!/bin/bash'
          - set -e
          - '# 强制克隆并切换到分支，彻底解决游离头状态'
          - git clone --depth 1 ${GITEE_REPO_URL} /root/workspace/joelinfo/divination-apk
          - cd /root/workspace/joelinfo/divination-apk
          - git checkout ${GITEE_BRANCH}
          - echo "✅ 代码拉取成功，当前分支：$(git rev-parse --abbrev-ref HEAD)"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
        notify: []
        strategy:
          retry: '0'
      - step: execute@docker
        name: 1ubuntu3
        displayName: 安装 Node 18
        certificate: ''
        image: ubuntu:22.04
        command:
          - cd /root/workspace/joelinfo/divination-apk
          - apt-get update -y
          - apt-get install -y curl
          - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          - apt-get install -y nodejs
          - node -v
          - npm -v
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
        notify: []
        strategy:
          retry: '0'
      - step: execute@docker
        name: execute_by_docker
        displayName: 安装依赖
        certificate: ''
        image: ubuntu:22.04
        command:
          - cd /root/workspace/joelinfo/divination-apk
          - npm install --legacy-peer-deps
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
        notify: []
        strategy:
          retry: '0'
      - step: build@gradle
        name: build_gradleap
        displayName: 构建签名 APK
        jdkVersion: '17'
        gradleVersion: '7.6'
        commands:
          - cd /root/workspace/joelinfo/divination-apk && chmod +x android/gradlew && cd android && ./gradlew clean assembleRelease -PstoreFile=${RELEASE_KEY} -PstorePassword=${STORE_PASSWORD} -PkeyAlias=${KEY_ALIAS} -PkeyPassword=${KEY_PASSWORD} --no-daemon
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - android/app/build/outputs/apk/release/*.apk
        caches:
          - ~/.gradle/caches
        notify: []
        strategy:
          retry: '0'
