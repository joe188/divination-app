version: '1.0'
name: 灵枢智能排盘 - 构建 APK
description: 严格按照用户命令升级 Node.js 18

jobs:
  - name: build-apk
    steps:
      - name: 卸载旧版 Node.js/npm
        run: |
          apt-get remove -y nodejs npm
          apt-get autoremove -y
      - name: 添加 Node.js 18 官方源
        run: |
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
          echo "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_18.x $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/nodesource.list
      - name: 安装 Node 18
        run: |
          apt-get update
          apt-get install -y nodejs
      - name: 验证版本
        run: |
          node -v
          npm -v
      - name: Grant gradlew permission
        run: chmod +x android/gradlew
      - name: 配置 Gradle 镜像
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
allprojects {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    mavenCentral()
  }
}
EOF
      - name: Install dependencies & Build
        run: |
          npm install --legacy-peer-deps
          cd android
          ./gradlew clean assembleRelease --no-daemon --stacktrace
      - name: Upload APK
        uses: artifacts/upload
        with:
          files:
            - source: android/app/build/outputs/apk/release/*.apk
              target: /
