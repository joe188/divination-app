version: '1.0'
name: 灵枢智能排盘 - APK 构建 (传统模式)
description: 使用 Node.js + Gradle 传统方式构建 (不使用 includeBuild)

stages:
  - name: 构建
    jobs:
      - name: build-apk
        image: node:18
        script:
          - echo "🚀 开始构建灵枢智能排盘..."
          - cd /root/workspace/joelinfo/divination-apk
          - echo "☕ 配置 Java 环境..."
          - |
            if [ -d "/usr/lib/jvm/java-11-openjdk" ]; then
              export JAVA_HOME=/usr/lib/jvm/java-11-openjdk
              export PATH=$JAVA_HOME/bin:$PATH
              echo "✅ Java 11 已配置"
            elif [ -d "/usr/lib/jvm/java-17-openjdk" ]; then
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
              export PATH=$JAVA_HOME/bin:$PATH
              echo "✅ Java 17 已配置"
            else
              echo "⚠️ 使用系统默认 Java"
            fi
          - echo "⚙️ 配置 Gradle 镜像..."
          - |
            mkdir -p ~/.gradle
            cat > ~/.gradle/init.gradle << 'GRADLE_EOF'
allprojects {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
    mavenCentral()
  }
}
GRADLE_EOF
          - echo "📦 安装项目依赖..."
          - npm install --legacy-peer-deps
          - echo "🏗️ 开始构建 APK (传统模式)..."
          - cd android
          - chmod +x gradlew
          - ./gradlew clean assembleRelease --no-daemon --stacktrace
        artifacts:
          - path: app/build/outputs/apk/release/app-release.apk
            name: lingshu-paipan.apk
            expire: 7d
