version: '1.0'
name: 灵枢智能排盘 - APK 构建 (修复版)
description: 构建 APK 并生成 output 制品 (修复 Release Artifact Failure)

stages:
  - name: 构建
    jobs:
      - name: build-apk
        image: node:18
        script:
          - echo "🚀 开始构建灵枢智能排盘..."
          - cd /root/workspace/joelinfo/divination-apk
          - echo "☕ 配置 Java 环境..."
          - |
            if [ -d "/usr/lib/jvm/java-11-openjdk" ]; then
              export JAVA_HOME=/usr/lib/jvm/java-11-openjdk
              export PATH=$JAVA_HOME/bin:$PATH
              echo "✅ Java 11 已配置"
            elif [ -d "/usr/lib/jvm/java-17-openjdk" ]; then
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
              export PATH=$JAVA_HOME/bin:$PATH
              echo "✅ Java 17 已配置"
            else
              echo "⚠️ 使用系统默认 Java"
            fi
          - echo "⚙️ 配置 Gradle 镜像..."
          - |
            mkdir -p ~/.gradle
            cat > ~/.gradle/init.gradle << 'EOF'
allprojects {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    mavenCentral()
  }
}
EOF
          - echo "📦 安装项目依赖..."
          - npm install --legacy-peer-deps
          - echo "🏗️ 开始构建 APK..."
          - cd android
          - chmod +x gradlew
          - ./gradlew clean assembleRelease --no-daemon --stacktrace
          - echo "📤 复制 APK 到标准制品路径..."
          - mkdir -p /tmp/artifacts
          - cp app/build/outputs/apk/release/app-release.apk /tmp/artifacts/output
        artifacts:
          - path: /tmp/artifacts/output
            name: output
            expire: 7d
