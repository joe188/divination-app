name: 灵枢智能排盘 - APK 构建

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-apk:
    name: 构建 APK
    runs-on: ubuntu-latest
    container:
      image: node:18
    
    steps:
      - name:  checkout 代码
        uses: actions/checkout@v3
      
      - name: 安装依赖
        run: |
          echo "🚀 开始构建灵枢智能排盘..."
          npm install
      
      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: 上传 APK
        uses: actions/upload-artifact@v3
        with:
          name: lingshu-paipan-apk
          path: android/app/build/outputs/apk/release/app-release.apk
