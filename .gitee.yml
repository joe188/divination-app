name: Build LingShu APK
on: [push, pull_request]

jobs:
  - name: Build APK
    runs-on: ubuntu-latest
    container:
      image: node:18
    steps:
      - name: Checkout code
        run: |
          echo "🚀 开始构建..."
          pwd
          ls -la
      
      - name: Install dependencies
        run: npm install
      
      - name: Build JS Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          echo "✅ JS Bundle 打包完成"
      
      - name: Setup Java and Android SDK
        run: |
          apt-get update && apt-get install -y wget unzip openjdk-17-jdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:$JAVA_HOME/bin
          
          mkdir -p /opt/android-sdk/cmdline-tools
          cd /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      
      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          cd android
          mkdir -p gradle/wrapper
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          
          java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --no-daemon 2>&1 | tail -30
      
      - name: Check APK
        run: |
          cd android
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK 未找到"
          find . -name "*.apk" -type f 2>/dev/null
          cp app/build/outputs/apk/debug/app-debug.apk ../LingShu-debug.apk 2>/dev/null || true
