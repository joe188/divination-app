apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.lingshu.paipan"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.lingshu.paipan"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.2.2"
    }
    signingConfigs {
        release {
            // 🔑 智能查找 keystore：优先 APKS 注入路径，fallback 到本地路径
            def _apksPath = '/workspace/android/app/release.keystore'
            def _localPath = 'android/app/release.keystore'
            def _ks = file(_apksPath)
            if (!_ks.exists()) {
                _ks = file(_localPath)
            }
            if (!_ks.exists()) {
                throw new GradleException("❌ Release keystore not found at:\n" +
                    "  1. ${_apksPath}\n" +
                    "  2. ${_localPath}\n" +
                    "Please ensure 'release.keystore' is committed to the repo.")
            }

            storeFile _ks
            storePassword 'Lingshu@123'
            keyAlias 'lingshu-release-key'
            keyPassword 'Lingshu@123'
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // APKS 会自动处理 V1/V2 签名，无需显式配置
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android:0.73.0'
}

// 移除 node_modules 依赖，Gitee /apks 不执行 npm install
// 如果有第三方库需要 apply from，在这里手动添加
