apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.lingshu.paipan"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.lingshu.paipan"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.2.2"
    }
    signingConfigs {
        release {
            // 🔑 APKS 环境：必须通过 -P 参数传入 keystore 信息（由 Gitee 界面配置提供）
            // 不允许自动生成，因为 APKS 环境无法持久化
            def storeFileProp = project.findProperty('storeFile')
            def storePassProp = project.findProperty('storePassword')
            def keyAliasProp = project.findProperty('keyAlias')
            def keyPassProp = project.findProperty('keyPassword')

            if (!storeFileProp) {
                throw new GradleException("❌ 缺少 storeFile 属性。请在 Gitee /apks 配置中上传 keystore 文件并勾选'保留签名配置'。")
            }
            if (!storePassProp) {
                throw new GradleException("❌ 缺少 storePassword 属性。请在 Gitee /apks 配置中设置存储密码。")
            }
            if (!keyAliasProp) {
                throw new GradleException("❌ 缺少 keyAlias 属性。请在 Gitee /apks 配置中设置密钥别名。")
            }
            if (!keyPassProp) {
                throw new GradleException("❌ 缺少 keyPassword 属性。请在 Gitee /apks 配置中设置密钥密码。")
            }

            storeFile file(storeFileProp)
            storePassword storePassProp
            keyAlias keyAliasProp
            keyPassword keyPassProp
            // APKS 会自动处理签名，无需显式配置 v1/v2
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // APKS 会自动处理 V1/V2 签名，无需显式配置
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android:0.73.0'
}

// 移除 node_modules 依赖，Gitee /apks 不执行 npm install
// 如果有第三方库需要 apply from，在这里手动添加
