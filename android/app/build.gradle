plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
}

android {
    namespace "com.lingshu.paipan"
    compileSdkVersion rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "com.lingshu.paipan"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.2.2"
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    signingConfigs {
        release {
            storeFile file('release.keystore')
            storePassword 'Lingshu@123'
            keyAlias 'lingshu-release-key'
            keyPassword 'Lingshu@123'
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    // 👇 手动添加 screens 和 safe-area 的源码与资源
    sourceSets {
        main {
            java {
                srcDir '../../node_modules/react-native-screens/android/src/main/java'
                srcDir '../../node_modules/react-native-safe-area-context/android/src/main/java'
            }
            res.srcDir '../../node_modules/react-native-screens/android/src/main/res'
            res.srcDir '../../node_modules/react-native-safe-area-context/android/src/main/res'
            assets.srcDir '../../node_modules/react-native-screens/android/src/main/assets'
            assets.srcDir '../../node_modules/react-native-safe-area-context/android/src/main/assets'
            jniLibs.srcDir '../../node_modules/react-native-screens/android/src/main/jniLibs'
            jniLibs.srcDir '../../node_modules/react-native-safe-area-context/android/src/main/jniLibs'
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    if (project.hasProperty("hermesEnabled") && project.hermesEnabled.toBoolean()) {
        implementation 'com.facebook.react:hermes-android:+'
    }
}