apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
// 传统方式：直接加载 react.gradle
apply from: file("../../node_modules/react-native/react.gradle")

android {
    namespace "com.lingshu.paipan"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.lingshu.paipan"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.2.2"
    }
    signingConfigs {
        release {
            // 从 Gradle 属性读取（Gitee 流水线传入 -PstoreFile=...）
            storeFile file(project.findProperty('storeFile') ?: 'release.keystore')
            storePassword project.findProperty('storePassword') ?: 'Lingshu@123'
            keyAlias project.findProperty('keyAlias') ?: 'lingshu-release-key'
            keyPassword project.findProperty('keyPassword') ?: 'Lingshu@123'
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android:0.73.0'
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
