apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.lingshu.paipan"
    compileSdkVersion rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "com.lingshu.paipan"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.2.2"
    }

    signingConfigs {
        release {
            storeFile file('release.keystore')
            storePassword 'Lingshu@123'
            keyAlias 'lingshu-release-key'
            keyPassword 'Lingshu@123'
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // React Android 核心库
    implementation project(':ReactAndroid')
    // Hermes 引擎
    if (project.hasProperty("hermesEnabled") && project.hermesEnabled.toBoolean()) {
        implementation 'com.facebook.react:hermes-android:0.73.0'
    }
    // 手动链接的库
    implementation project(':react-native-screens')
    implementation project(':react-native-safe-area-context')
}

// 本地环境：强制替换远程 react-native 依赖为本地 ReactAndroid（Gradle 8.2 兼容写法）
afterEvaluate {
    configurations.all { config ->
        config.resolutionStrategy.dependencySubstitution { sub ->
            all { substitution ->
                if (substitution.requested.module == 'com.facebook.react:react-native') {
                    substitution.useTarget project(':ReactAndroid')
                }
            }
        }
    }
}