apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.lingshu.paipan"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.lingshu.paipan"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.2.2"
    }
    signingConfigs {
        release {
            // 🔑 优先使用 APKS 注入的 storeFile 参数，然后 fallback 到已知路径
            def _propStoreFile = project.findProperty('storeFile')
            def _ks
            if (_propStoreFile) {
                _ks = file(_propStoreFile)
            } else {
                // APKS 可能直接复制到标准路径
                def _apksPath = '/workspace/android/app/release.keystore'
                def _localPath = 'release.keystore'  // 相对于 android/app/
                _ks = file(_apksPath)
                if (!_ks.exists()) {
                    _ks = file(_localPath)
                }
            }
            if (!_ks.exists()) {
                throw new GradleException("❌ Release keystore not found.\n" +
                    "Checked:\n" +
                    "  - storeFile property: ${_propStoreFile}\n" +
                    "  - /workspace/android/app/release.keystore\n" +
                    "  - release.keystore (relative to android/app/)\n" +
                    "Please ensure keystore is committed and APKS signing is configured.")
            }

            storeFile _ks
            // 优先使用注入的密码/别名，否则用默认值
            storePassword project.findProperty('storePassword') ?: 'Lingshu@123'
            keyAlias project.findProperty('keyAlias') ?: 'lingshu-release-key'
            keyPassword project.findProperty('keyPassword') ?: 'Lingshu@123'
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // APKS 会自动处理 V1/V2 签名，无需显式配置
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android:0.73.0'
}

// 移除 node_modules 依赖，Gitee /apks 不执行 npm install
// 如果有第三方库需要 apply from，在这里手动添加
