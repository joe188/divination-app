// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.2.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// 查找项目根目录中的 node_modules
def findRootProject(File dir) {
    if (new File(dir, "node_modules").exists()) {
        return dir
    }
    def parent = dir.getParentFile()
    if (parent != null) {
        return findRootProject(parent)
    }
    return null
}

def rootProjectDir = findRootProject(project.rootDir)
if (rootProjectDir != null) {
    def autolinkGradle = new File(rootProjectDir, "node_modules/@react-native/gradle-plugin/build/generated/autolinking/autolinkLibrariesWithApp.gradle")
    if (autolinkGradle.exists()) {
        apply from: autolinkGradle
    }
}