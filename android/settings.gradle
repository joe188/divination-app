pluginManagement {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
        gradlePluginPortal()
        maven { url '../node_modules/@react-native/gradle-plugin' }
    }
    plugins {
        id 'com.facebook.react' version '0.73.0'
    }
}

rootProject.name = 'DivinationApp'

ext {
    buildToolsVersion = "34.0.0"
    minSdkVersion = 24
    compileSdkVersion = 34
    targetSdkVersion = 34
    ndkVersion = "25.1.8937393"
    kotlinVersion = "1.7.22"
}

// 手动包含 React Native 核心库
include ':ReactAndroid'
project(':ReactAndroid').projectDir = new File(rootProject.projectDir, '../node_modules/react-native/ReactAndroid')

// 手动包含 react-native-screens 和 safe-area-context
include ':react-native-screens'
project(':react-native-screens').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-screens/android')

include ':react-native-safe-area-context'
project(':react-native-safe-area-context').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-safe-area-context/android')

println "⚠️ 手动链接 RN 核心库和依赖"

include ':app'

// 本地环境专用：强制替换远程 react-native 为本地 ReactAndroid
gradle.beforeProject { project ->
    project.configurations.all { config ->
        config.resolutionStrategy.dependencySubstitution {
            substitute module('com.facebook.react:react-native').using project(':ReactAndroid')
                .because '本地环境使用 ReactAndroid 源码'
        }
    }
}