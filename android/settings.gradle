// 已完全移除 pluginManagement，不依赖 node_modules
ext {
    buildToolsVersion = "34.0.0"
    minSdkVersion = 24
    compileSdkVersion = 34
    targetSdkVersion = 34
    ndkVersion = "25.1.8937393"
    kotlinVersion = "1.7.22"  // RN 0.72.7 必须用 1.7.22
}
rootProject.name = 'DivinationApp'

// 启用 React Native autolink
apply from: file("../node_modules/react-native/react.gradle")

// 手动声明 app 模块
include ':app'