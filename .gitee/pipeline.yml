version: 1
name: 🚀 Build & Sign Android Release APK (Full Control)
agent:
  machine:
    type: linux
    # 使用 Gitee 默认 Ubuntu 镜像

env:
  GITEE_REPO: ${{ secrets.GITEE_REPO }} # 格式：username/repo-name
  GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }} # 在 Gitee CI Secrets 中设置（权限：repo）
  APK_VERSION_NAME: "1.2.2"
  APK_VERSION_CODE: "1"

steps:
  - name: 📥 Prepare Workspace
    run: |
      # Gitee CI 自动克隆代码到当前目录，无需额外 clone
      echo "✅ Workspace ready at $(pwd)"
      ls -la

  - name: 🧰 Setup Java 17 & Dependencies
    run: |
      sudo apt-get update -qq
      sudo apt-get install -y -qq openjdk-17-jdk unzip zip
      java -version
      # 确保 gradlew 可执行
      chmod +x android/gradlew

  - name: 🔐 Configure Keystore in Gradle Properties
    run: |
      mkdir -p ~/.gradle
      cat > ~/.gradle/gradle.properties << EOF
storeFile=app/release.keystore
storePassword=Lingshu@123
keyAlias=lingshu-release-key
keyPassword=Lingshu@123
EOF
      echo "✅ Keystore config written to ~/.gradle/gradle.properties"

  - name: 🛠️ Build Release APK
    run: |
      cd android
      ./gradlew assembleRelease --no-daemon --console=plain
      echo "📦 APK 输出目录："
      ls -la app/build/outputs/apk/release/

  - name: 🔍 Verify APK Signature Integrity (V1 Required)
    run: |
      cd android/app/build/outputs/apk/release/
      APK_FILE=$(ls app-release*.apk | head -1)
      echo "🔍 检查 APK: $APK_FILE"

      # 检查 META-INF/MANIFEST.MF（V1 签名的核心文件）
      if unzip -l "$APK_FILE" | grep -q "META-INF/MANIFEST.MF"; then
        echo "✅ META-INF/MANIFEST.MF 存在（V1 签名）"
      else
        echo "❌ 缺少 META-INF/MANIFEST.MF！签名失败。"
        unzip -l "$APK_FILE" | head -20
        exit 1
      fi

      # 检查其他签名文件
      if unzip -l "$APK_FILE" | grep -q "META-INF/CERT.RSA"; then
        echo "✅ META-INF/CERT.RSA 存在"
      fi
      if unzip -l "$APK_FILE" | grep -q "META-INF/CERT.SF"; then
        echo "✅ META-INF/CERT.SF 存在"
      fi

      # 可选：如果安装了 apksigner，进行完整验证
      if command -v apksigner &>/dev/null; then
        echo "🔍 使用 apksigner 验证签名..."
        apksigner verify --verbose "$APK_FILE" || exit 1
      else
        echo "⚠️ 未检测到 apksigner，跳过高级验证（但 V1 签名已确认）"
      fi

  - name: 🔑 Extract SHA-256 Fingerprint (for Firebase/Play Console)
    run: |
      if [ -f ../../../app/release.keystore ]; then
        echo "🔑 密钥库 SHA-256 指纹："
        keytool -list -v -keystore ../../../app/release.keystore -storepass Lingshu@123 2>/dev/null | grep "SHA256:" | head -1
      else
        echo "⚠️ 未找到 keystore（../../../app/release.keystore），无法输出指纹"
      fi

  - name: 🚀 Create Gitee Release & Upload APK
    run: |
      cd android/app/build/outputs/apk/release/
      APK_FILE=$(ls app-release*.apk | head -1)
      RELEASE_TITLE="Release v${APK_VERSION_NAME} (${APK_VERSION_CODE})"
      RELEASE_BODY="Automated build from Gitee CI\n\nSHA-256: $(keytool -list -v -keystore ../../../app/release.keystore -storepass Lingshu@123 2>/dev/null | grep 'SHA256:' | head -1 | awk '{print $2}')"

      echo "📤 创建 Gitee Release: ${RELEASE_TITLE}"
      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
        -H "Authorization: Bearer $GITEE_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{
          \"tag_name\": \"v${APK_VERSION_NAME}\",
          \"name\": \"${RELEASE_TITLE}\",
          \"body\": \"${RELEASE_BODY}\",
          \"target_commitish\": \"master\"
        }" \
        "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases")

      HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
      RESP_BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" != "201" ]; then
        echo "❌ 创建 Release 失败: HTTP $HTTP_CODE"
        echo "$RESP_BODY"
        exit 1
      fi

      RELEASE_ID=$(echo "$RESP_BODY" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
      echo "✅ Release 创建成功，ID: $RELEASE_ID"

      echo "⬆️ 上传 APK: $APK_FILE"
      UPLOAD_RESP=$(curl -s -w "\n%{http_code}" -X POST \
        -H "Authorization: Bearer $GITEE_TOKEN" \
        -F "file=@${APK_FILE}" \
        "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases/${RELEASE_ID}/assets")

      HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -n1)
      if [ "$HTTP_CODE" != "201" ]; then
        echo "❌ 上传 APK 失败: HTTP $HTTP_CODE"
        exit 1
      fi

      echo "🎉 APK 已成功上传到 Gitee Release！"
