name: Build LingShu APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build React Native Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          echo "✅ JS Bundle 打包完成"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Download Gradle Wrapper
        run: |
          echo "🚀 下载 Gradle Wrapper..."
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          ls -la android/gradle/wrapper/
      
      - name: Build APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          echo "🚀 构建 APK..."
          cd android
          java -jar gradle/wrapper/gradle-wrapper.jar assembleRelease --no-daemon 2>&1
          
          echo ""
          echo "🔍 检查 APK..."
          echo "当前目录: $(pwd)"
          ls -la app/build/outputs/apk/release/ 2>/dev/null && echo "✅ Release APK 找到!" || true
          ls -la app/build/outputs/apk/debug/ 2>/dev/null && echo "✅ Debug APK 找到!" || true
          find . -name "*.apk" -type f 2>/dev/null
      
      - name: Rename APK
        run: |
          cd android
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk ../LingShu.apk
            echo "✅ 使用 Release APK"
          elif [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk ../LingShu.apk
            echo "✅ 使用 Debug APK"
          else
            echo "❌ 未找到 APK 文件!"
            ls -la app/build/outputs/apk/ 2>/dev/null || echo "outputs/apk 目录不存在"
            find . -name "*.apk" -type f 2>/dev/null || echo "未找到任何 APK"
            exit 1
          fi
          cd ..
          ls -la LingShu.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LingShu-apk
          path: LingShu.apk
          retention-days: 7
      
      - name: Display Download Info
        run: |
          echo "============================================"
          echo "🎉 构建成功！"
          echo ""
          echo "📦 APK 文件名: LingShu.apk"
          echo "📥 请在页面顶部 Artifacts 处下载"
          echo ""
          echo "📱 安装前请先卸载旧版本"
          echo "============================================"